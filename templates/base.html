<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>树苗管理系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f8fa; color: #222; }
        .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); padding: 16px; }
        h1 { margin: 0 0 12px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        input, select { padding: 8px 10px; border: 1px solid #dcdfe6; border-radius: 8px; }
        button, .btn { background: #1677ff; color: #fff; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn.secondary { background: #6b7280; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { border-bottom: 1px solid #eceff4; padding: 10px; text-align: left; vertical-align: middle; }
        th { background: #fafafa; }
        .photo { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .status { font-weight: 600; }
        .sold { color: #999; }
        .unsold { color: #1f8b4c; }
        .flash { margin-bottom: 12px; padding: 10px 12px; background: #e8f4ff; color: #1358a6; border-radius: 8px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .danger { background: #e03131; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            table { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
