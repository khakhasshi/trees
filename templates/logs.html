{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>操作日志（最近300条）</h1>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>时间</th>
                    <th>用户</th>
                    <th>动作</th>
                    <th>对象</th>
                    <th>对象ID</th>
                    <th>详情</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row['created_at'] }}</td>
                    <td>{{ row['username'] }}</td>
                    <td>{{ row['action'] }}</td>
                    <td>{{ row['target_type'] }}</td>
                    <td>{{ row['target_id'] }}</td>
                    <td>{{ row['detail'] }}</td>
                </tr>
                {% else %}
                <tr><td colspan="6">暂无日志。</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
