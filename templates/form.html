{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>{{ '编辑树苗' if seedling else '新增树苗' }}</h1>
    <form method="post" enctype="multipart/form-data">
        <div class="form-grid">
            <label class="field">
                <span>编号 *</span>
                <input type="text" name="code" required value="{{ seedling['code'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>高度(米) *</span>
                <input type="number" step="0.01" name="height" required value="{{ seedling['height'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>树冠宽度(米) *</span>
                <input type="number" step="0.01" name="crown_width" required value="{{ seedling['crown_width'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>价格(元) *</span>
                <input type="number" step="0.01" name="price" required value="{{ seedling['price'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>上传照片（自动命名为“编号.后缀”）</span>
                <input type="file" name="photo_file" accept=".jpg,.jpeg,.png,.webp">
            </label>
            <label class="field">
                <span>是否售出</span>
                <input type="checkbox" name="sold" {% if seedling and seedling['sold'] %}checked{% endif %}>
            </label>
            <label class="field">
                <span>售出日期</span>
                <input type="date" name="sold_date" value="{{ seedling['sold_date'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>客户</span>
                <input type="text" name="customer_name" value="{{ seedling['customer_name'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>联系方式</span>
                <input type="text" name="customer_contact" value="{{ seedling['customer_contact'] if seedling else '' }}">
            </label>
            <label class="field">
                <span>备注</span>
                <textarea name="notes">{{ seedling['notes'] if seedling else '' }}</textarea>
            </label>
        </div>

        {% if seedling and seedling['photo'] %}
        <div style="margin-top: 10px;">
            <span>当前图片：</span>
            <img class="photo" src="{{ url_for('pictures', filename=seedling['photo']) }}" alt="{{ seedling['code'] }}">
        </div>
        {% endif %}

        <div class="actions" style="margin-top: 14px;">
            <button type="submit">保存</button>
            <a class="btn secondary" href="{{ url_for('index') }}">返回列表</a>
        </div>
    </form>
</div>
{% endblock %}
